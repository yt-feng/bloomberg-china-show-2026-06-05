name: Cut Speaker Clips (full render)

on:
  workflow_dispatch:
    inputs:
      url:
        description: Bloomberg video URL
        required: true
        type: string
        default: https://www.bloomberg.com/news/videos/2026-06-05/the-china-show-6-5-2026-video
      speaker:
        description: Speaker name
        required: true
        type: string
        default: Wang Yi
      speaker_context:
        description: Speaker context
        required: false
        type: string
        default: "Goldman Sachs, head of China real estate research"
      segment_start:
        description: "Speaker segment start (seconds)"
        required: true
        type: number
        default: 4270
      segment_end:
        description: "Speaker segment end (seconds)"
        required: true
        type: number
        default: 4755
      min_clip_seconds:
        description: Minimum clip duration
        required: false
        type: number
        default: 20
      max_clip_seconds:
        description: Maximum clip duration
        required: false
        type: number
        default: 90
      render_only:
        description: "Optional clip indexes to render first, e.g. 1 or 1-2"
        required: false
        type: string
        default: ""
      font_preset:
        description: "Overlay font preset: noto-sc, noto-serif-sc, wqy-zenhei, wqy-microhei, pingfang, or compare"
        required: false
        type: string
        default: "noto-sc"

jobs:
  render-clips:
    name: Download → Transcribe → Plan → Render
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--Systran--faster-whisper-base
          key: whisper-model-base

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install faster-whisper Pillow

      - name: Download Bloomberg video
        env:
          PYTHONUNBUFFERED: "1"
          BLOOMBERG_PROXY_SUBSCRIPTION_URL: ${{ secrets.BLOOMBERG_PROXY_SUBSCRIPTION_URL }}
        run: |
          python tools/download_bloomberg_video.py \
            --url "${{ inputs.url }}" \
            --download-backend yt-dlp \
            --yt-dlp-proxy-mode auto \
            --workers 32 \
            --no-strategy-cache

      - name: Identify video file
        run: |
          VIDEO_FILE=$(ls downloads/*.mp4 | head -1)
          echo "VIDEO_FILE=$VIDEO_FILE" >> "$GITHUB_ENV"
          echo "Downloaded: $VIDEO_FILE"
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE"

      - name: Transcribe speaker segment
        env:
          PYTHONUNBUFFERED: "1"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p work/speaker
          python -c "
          import json, sys
          sys.path.insert(0, 'tools')
          from extract_speaker_clips import transcribe
          from pathlib import Path

          # Extract and transcribe only the speaker segment (fast with base model)
          import subprocess
          video = '${{ env.VIDEO_FILE }}'
          start = ${{ inputs.segment_start }}
          end = ${{ inputs.segment_end }}

          # Extract segment audio
          subprocess.run([
              'ffmpeg', '-y', '-ss', str(start), '-i', video,
              '-t', str(end - start), '-vn', '-ac', '1', '-ar', '16000',
              '-c:a', 'pcm_s16le', 'work/speaker/segment_audio.wav'
          ], check=True, capture_output=True)

          # Transcribe with faster-whisper base model
          from faster_whisper import WhisperModel
          import time
          model = None
          for attempt in range(5):
              try:
                  model = WhisperModel('base', device='cpu', compute_type='int8')
                  break
              except Exception as e:
                  if '429' in str(e):
                      time.sleep(20 * (attempt + 1))
                  else:
                      raise
          if model is None:
              raise SystemExit('Failed to load whisper model')

          segments_iter, info = model.transcribe(
              'work/speaker/segment_audio.wav',
              language='en', vad_filter=True, beam_size=5,
          )

          segments = []
          for seg in segments_iter:
              segments.append({
                  'start': round(seg.start + start, 2),
                  'end': round(seg.end + start, 2),
                  'text': seg.text.strip(),
              })

          payload = {'model': 'base', 'language': 'en', 'segments': segments}
          Path('work/speaker/transcript.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2))
          print(f'Transcribed {len(segments)} segments')
          "

      - name: Plan highlights with DeepSeek
        env:
          PYTHONUNBUFFERED: "1"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python tools/plan_speaker_highlights.py \
            --transcript work/speaker/transcript.json \
            --speaker "${{ inputs.speaker }}" \
            --speaker-context "${{ inputs.speaker_context }}" \
            --segment-start ${{ inputs.segment_start }} \
            --segment-end ${{ inputs.segment_end }} \
            --min-seconds ${{ inputs.min_clip_seconds }} \
            --max-seconds ${{ inputs.max_clip_seconds }} \
            --out work/speaker/highlight_plan.json

      - name: Render clips (Pillow overlays + ffmpeg)
        env:
          PYTHONUNBUFFERED: "1"
          BBG_OVERLAY_FONT_PRESET: ${{ inputs.font_preset }}
        run: |
          RENDER_ARGS=()
          if [ -n "${{ inputs.render_only }}" ]; then
            RENDER_ARGS+=(--only "${{ inputs.render_only }}")
          fi
          if [ "${BBG_OVERLAY_FONT_PRESET}" = "compare" ]; then
            for PRESET in noto-sc noto-serif-sc wqy-zenhei wqy-microhei; do
              echo "Rendering font preset: ${PRESET}"
              BBG_OVERLAY_FONT_PRESET="${PRESET}" python tools/render_clips_linux.py \
                --source "$VIDEO_FILE" \
                --plan work/speaker/highlight_plan.json \
                --out-dir "clips_final/${PRESET}" \
                --work-dir "work/render-${PRESET}" \
                --threads 2 \
                "${RENDER_ARGS[@]}"
            done
          else
            echo "Rendering font preset: ${BBG_OVERLAY_FONT_PRESET}"
            python tools/render_clips_linux.py \
              --source "$VIDEO_FILE" \
              --plan work/speaker/highlight_plan.json \
              --out-dir "clips_final" \
              --work-dir work/render \
              --threads 2 \
              "${RENDER_ARGS[@]}"
          fi

      - name: Show results
        run: |
          echo "=== Final rendered clips ==="
          find clips_final -type f -name '*.mp4' -print -exec ls -lh {} \;
          echo ""
          echo "=== Plan ==="
          cat work/speaker/highlight_plan.json | python -m json.tool | head -80

      - name: Upload rendered clips
        uses: actions/upload-artifact@v5
        with:
          name: rendered-clips
          path: |
            clips_final/*.mp4
            clips_final/**/*.mp4
          retention-days: 14

      - name: Upload plan
        uses: actions/upload-artifact@v5
        with:
          name: highlight-plan
          path: work/speaker/highlight_plan.json
          retention-days: 30
