name: Render Speaker Full Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: Bloomberg video URL
        required: true
        type: string
        default: https://www.bloomberg.com/news/videos/2026-06-05/the-china-show-6-5-2026-video
      speaker:
        description: Speaker name
        required: true
        type: string
        default: Wang Yi
      speaker_context:
        description: Speaker context
        required: false
        type: string
        default: "Goldman Sachs, head of China real estate research"
      segment_start:
        description: "Speaker segment start (seconds)"
        required: true
        type: number
        default: 4270
      segment_end:
        description: "Speaker segment end (seconds)"
        required: true
        type: number
        default: 4647
      title_line1:
        description: Title line 1
        required: false
        type: string
        default: 高盛王逸
      title_line2:
        description: Title line 2
        required: false
        type: string
        default: 完整版
      title_line3:
        description: Title line 3
        required: false
        type: string
        default: 中国楼市复苏路径
      font_preset:
        description: Overlay font preset
        required: false
        type: choice
        options:
          - noto-serif-sc
          - noto-sc
          - wqy-zenhei
          - wqy-microhei
        default: noto-serif-sc

jobs:
  render-full:
    name: Download → Transcribe → Translate → Render Full
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/models--Systran--faster-whisper-base
          key: whisper-model-base

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install faster-whisper Pillow

      - name: Download Bloomberg video
        env:
          PYTHONUNBUFFERED: "1"
          BLOOMBERG_PROXY_SUBSCRIPTION_URL: ${{ secrets.BLOOMBERG_PROXY_SUBSCRIPTION_URL }}
        run: |
          python tools/download_bloomberg_video.py \
            --url "${{ inputs.url }}" \
            --download-backend auto \
            --yt-dlp-proxy-mode auto \
            --output-dir downloads \
            --work-dir work/download \
            --workers 32 \
            --no-strategy-cache

      - name: Identify video file
        run: |
          VIDEO_FILE=$(find downloads -type f -name '*.mp4' | head -1)
          if [ -z "$VIDEO_FILE" ]; then
            echo "No MP4 found in downloads/" >&2
            exit 1
          fi
          echo "VIDEO_FILE=$VIDEO_FILE" >> "$GITHUB_ENV"
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO_FILE"

      - name: Transcribe speaker segment
        env:
          PYTHONUNBUFFERED: "1"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p work/full
          python -c "
          import json
          import subprocess
          from pathlib import Path
          from faster_whisper import WhisperModel

          video = '${{ env.VIDEO_FILE }}'
          start = ${{ inputs.segment_start }}
          end = ${{ inputs.segment_end }}

          subprocess.run([
              'ffmpeg', '-y', '-ss', str(start), '-i', video,
              '-t', str(end - start), '-vn', '-ac', '1', '-ar', '16000',
              '-c:a', 'pcm_s16le', 'work/full/segment_audio.wav'
          ], check=True, capture_output=True)

          model = WhisperModel('base', device='cpu', compute_type='int8')
          segments_iter, info = model.transcribe(
              'work/full/segment_audio.wav',
              language='en', vad_filter=True, beam_size=5,
          )
          segments = []
          for seg in segments_iter:
              segments.append({
                  'start': round(seg.start + start, 2),
                  'end': round(seg.end + start, 2),
                  'text': seg.text.strip(),
              })
          payload = {'model': 'base', 'language': 'en', 'segments': segments}
          Path('work/full/transcript.json').write_text(json.dumps(payload, ensure_ascii=False, indent=2))
          print(f'Transcribed {len(segments)} segments')
          "

      - name: Build full bilingual plan
        env:
          PYTHONUNBUFFERED: "1"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python tools/plan_speaker_full.py \
            --transcript work/full/transcript.json \
            --speaker "${{ inputs.speaker }}" \
            --speaker-context "${{ inputs.speaker_context }}" \
            --segment-start ${{ inputs.segment_start }} \
            --segment-end ${{ inputs.segment_end }} \
            --title-line1 "${{ inputs.title_line1 }}" \
            --title-line2 "${{ inputs.title_line2 }}" \
            --title-line3 "${{ inputs.title_line3 }}" \
            --title-highlights "${{ inputs.title_line2 }},${{ inputs.title_line3 }}" \
            --out work/full/full_plan.json

      - name: Render full video
        env:
          PYTHONUNBUFFERED: "1"
          BBG_OVERLAY_FONT_PRESET: ${{ inputs.font_preset }}
        run: |
          python tools/render_clips_linux.py \
            --source "$VIDEO_FILE" \
            --plan work/full/full_plan.json \
            --out-dir full_video \
            --work-dir work/full_render \
            --threads 2 \
            --force

      - name: Show results
        run: |
          echo "=== Full video ==="
          find full_video -type f -name '*.mp4' -print -exec ls -lh {} \;
          echo ""
          echo "=== Plan preview ==="
          cat work/full/full_plan.json | python -m json.tool | head -120

      - name: Upload full video
        uses: actions/upload-artifact@v5
        with:
          name: wang-yi-full-video
          path: full_video/*.mp4
          if-no-files-found: error
          retention-days: 14

      - name: Upload full plan and transcript
        uses: actions/upload-artifact@v5
        with:
          name: wang-yi-full-plan
          path: |
            work/full/full_plan.json
            work/full/transcript.json
          if-no-files-found: error
          retention-days: 30
